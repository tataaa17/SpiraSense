<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Petugas - SpiraSense</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--alabaster);">

    <div class="auth-page-wrapper">
        <div class="auth-box">
            <div class="logo" style="text-align: center; margin-bottom: 2rem;">Spira<span>Sense</span></div>
            
            <div class="auth-toggle">
                <button id="toggleLogin" class="active">Masuk</button>
                <button id="toggleRegister">Daftar</button>
            </div>

            <form id="loginForm" class="auth-form">
                <h2>Petugas Login</h2>
                <input type="email" id="loginEmail" placeholder="Email Puskesmas" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn-auth">Masuk Sekarang</button>
                <a href="index.html" style="text-align: center; color: var(--midnight-blue); font-size: 0.8rem; text-decoration: none;">← Kembali ke Home</a>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <h2>Daftar Baru</h2>
                <input type="text" id="regInstansi" placeholder="Nama Puskesmas/Posyandu" required>
                <input type="email" id="regEmail" placeholder="Email Instansi" required>
                <input type="password" id="regPassword" placeholder="Buat Password" required>
                <button type="submit" class="btn-auth" style="background: var(--maroon);">Daftar Akun</button>
            </form>
        </div>
    </div>

    <script src="auth-script.js"></script>
</body>
</html>
